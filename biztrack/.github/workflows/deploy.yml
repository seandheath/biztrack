name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Required for OIDC-based GitHub Pages deployment (no PAT needed)
permissions:
  pages: write
  id-token: write

# Only one deployment runs at a time; cancel in-progress if a new push arrives
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: biztrack/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: biztrack

      - name: Build
        run: npm run build
        working-directory: biztrack

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # SvelteKit adapter-static outputs to build/
          path: biztrack/build

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
